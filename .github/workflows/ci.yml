name: CI

# Guards the release bars automatically (SPRINT-002 T2 / TASK-008): every push and PR
# to main runs `pnpm verify` = owner-string grep gate + typecheck + build + tests.
# The eval matrix is NOT run here (it spends tokens) — see eval.yml (manual dispatch).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify (owner-string gate + typecheck + build + tests)
        run: pnpm verify
